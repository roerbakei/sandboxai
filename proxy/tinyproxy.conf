# The egress policy, in full. This is the entire "what can get out" surface — auditable in 20 lines.
User nobody
Group nobody
Port 8888
Timeout 600

# Only private (docker-internal) sources may use the proxy. The box's LAN subnet is assigned by docker
# per egress policy, so we can't pin one /24 — but it's always RFC1918, and a public source has no route
# to this proxy anyway (its only foot off-host is the dead-end sandbox LAN + the managed WAN bridge).
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# CONNECT (HTTPS tunnel) is restricted to web ports ONLY.
# This is what kills `ssh -o ProxyCommand` / CONNECT host:22 — no tunnel to prod's SSH.
ConnectPort 443
ConnectPort 563

# Plain HTTP (port 80) proxying is on by default for package mirrors that still use it. ConnectPort
# only gates CONNECT, so the egress port allowlist in entrypoint.sh is what stops plain-HTTP from
# reaching non-web ports (SSH/22, postgres/5432, ...) — that firewall is the real boundary.
